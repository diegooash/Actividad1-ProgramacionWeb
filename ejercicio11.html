<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - Conversor de distancia </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-calculadora">
        <h1>Conversor de distancia</h1>
        
        <div class="grupo-formulario">
            <label for="inputKilometros">Kilometros (km):</label>
            <input type="number" id="inputKilometros" placeholder="Ej: 2" min="0">
        </div>

        <button id="btnConvertir" class="boton-convertir">Convertir</button>

        <div class="grupo-formulario">
            <label for="inputMillas">Millas:</label>
            <input type="text" id="inputMillas" readonly placeholder="Resultado">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio11.js"></script>
</body>
</html>
