<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio18.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card tarjeta-custom p-4">
            <div class="card-body">
                <h1 class="text-center mb-4 fs-3 fw-bold" style="color: #0f6167;">Lista dinamica</h1>

                <div class="input-group mb-4">
                    <input type="text" id="nuevoElemento" class="form-control form-control-lg" placeholder="Escribe un elemento" aria-label="Nuevo elemento">
                    <button id="agregarBtn" class="btn btn-primario-custom px-4" type="button">Agregar</button>
                </div>
                
                <h2 class="fs-6 fw-bold text-secondary mb-3">ELEMENTOS AGREGADOS:</h2>

                <ul id="lista" class="list-group list-group-flush">
                </ul>

                <div id="estadoVacio" class="text-center py-4 text-muted fst-italic">
                    La lista esta vacia
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ejercicio18.js"></script>
</body>
</html>
