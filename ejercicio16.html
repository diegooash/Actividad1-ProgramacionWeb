<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio16.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="contenedor-calculadora">
        <h1>Calculadora</h1>

        <div class="grupo-formulario">
            <label for="numero1">Numero 1:</label>
            <input type="text" id="numero1" placeholder="Ej: 15">
        </div>
        <div class="grupo-formulario">
            <label for="numero2">Numero 2:</label>
            <input type="text" id="numero2" placeholder="Ej: 5">
        </div>

        <div class="grid-botones">
            <button id="btnSumar" class="boton-convertir">Sumar</button>
            <button id="btnRestar" class="boton-convertir">Restar</button>
            <button id="btnMultiplicar" class="boton-convertir">Multiplicar</button>
            <button id="btnDividir" class="boton-convertir">Dividir</button>
        </div>
        
        <div class="grupo-formulario">
            <label for="resultado">Resultado:</label>
            <input type="text" id="resultado" readonly placeholder="Resultado">
        </div>
    </div>
    <script src="js/ejercicio16.js"></script>
</body>
</html>
