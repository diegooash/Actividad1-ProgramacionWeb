<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">

<body>

    <div class="contenedor-calculadora">
        <h1>Verificador de edad </h1>
        
        <div class="grupo-formulario">
            <label for="inputEdad">Edad (en años):</label>
            <input type="number" id="inputEdad" placeholder="Ej: 30" min="0">
        </div>

        <button id="btnConvertir" class="boton-convertir">Verificar</button>

        <div class="grupo-formulario">
            <label for="resultado">¿Puede votar?:</label>
            <input type="text" id="resultado" readonly placeholder="Respuesta">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio13.js"></script>
</body>
