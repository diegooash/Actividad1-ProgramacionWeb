<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Conversor JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-calculadora">
        <h1>Conversor de Temperatura</h1>
        
        <div class="grupo-formulario">
            <label for="inputCelsius">Grados Celsius (°C):</label>
            <input type="number" id="inputCelsius" placeholder="Ej: 25">
        </div>

        <button id="btnConvertir" class="boton-convertir">Convertir</button>

        <div class="grupo-formulario">
            <label for="inputFahrenheit">Grados Fahrenheit (°F):</label>
            <input type="text" id="inputFahrenheit" readonly placeholder="Resultado">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio10.js"></script>
</body>
</html>
